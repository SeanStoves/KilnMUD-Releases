name: Bug Report
description: Report a bug or issue with KilnMUD
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: KilnMUD Version
      placeholder: e.g. v1.5.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages or crash logs
      render: shell
