name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would this help your workflow?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / Interface
        - Scripting / Lua / JS / Python
        - Triggers / Aliases / Timers
        - Networking / Telnet / GMCP
        - Miniwindows / Drawing
        - MUSHclient Compatibility
        - Mudlet Compatibility
        - Plugins
        - Other
